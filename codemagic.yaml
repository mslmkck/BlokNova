workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: stable
      dart: stable
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Analyze code
        script: |
          flutter analyze
      - name: Build APK
        script: |
          flutter build apk --debug
    artifacts:
      - path: build/app/outputs/flutter-apk/*.apk
        name: app-debug.apk
        type: application/vnd.android.package-archive

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      dart: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
          bundle install
          bundle exec pod install
      - name: Analyze code
        script: |
          flutter analyze
      - name: Build iOS
        script: |
          flutter build ipa --debug
    artifacts:
      - path: build/app/outputs/flutter-ios/*.ipa
        type: application/octet-stream

  release-workflow:
    name: Release Build
    max_build_duration: 30
    environment:
      flutter: stable
      dart: stable
      android_signing:
        - keystore
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: release/*
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build Release APK
        script: |
          flutter build apk --release
    artifacts:
      - path: build/app/outputs/flutter-apk/*.apk
        name: app-release.apk
        type: application/vnd.android.package-archive
